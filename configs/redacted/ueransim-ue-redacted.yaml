# Redacted UERANSIM UE configuration example for a Free5GC lab.
# Replace placeholders before use. Subscriber values must match the Free5GC WebConsole subscriber.

supi: 'imsi-<SUBSCRIBER_SUPI>'
mcc: '208'
mnc: '93'

protectionScheme: 0
homeNetworkPublicKey: '<HOME_NETWORK_PUBLIC_KEY_OR_SAMPLE_VALUE>'
homeNetworkPublicKeyId: 1
routingIndicator: '0000'

key: '<SUBSCRIBER_KEY>'
op: '<SUBSCRIBER_OP_OR_OPC>'
opType: 'OPC'
amf: '8000'

imei: '<REDACTED_IMEI>'
imeiSv: '<REDACTED_IMEISV>'

tunNetmask: '255.255.255.0'

gnbSearchList:
  - '<UERANSIM_VM_IP>'

uacAic:
  mps: false
  mcs: false

uacAcc:
  normalClass: 0
  class11: false
  class12: false
  class13: false
  class14: false
  class15: false

sessions:
  - type: 'IPv4'
    apn: 'internet'
    slice:
      sst: 1
      sd: 0x010203

configured-nssai:
  - sst: 1
    sd: 0x010203

default-nssai:
  - sst: 1
    sd: 0x010203

integrity:
  IA1: true
  IA2: true
  IA3: true

ciphering:
  EA1: true
  EA2: true
  EA3: true

integrityMaxRate:
  uplink: 'full'
  downlink: 'full'
